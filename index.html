<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(주나쌤)보건교사회 경품 추첨</title>
    <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
        :root {
            /* 핑크 테마를 위한 색상 변수 변경 */
            --bg-color: #fff0f3; /* 연한 핑크색 배경 (딸기우유빛) */
            --container-bg: rgba(255, 255, 255, 0.7); /* 반투명 흰색 박스 */
            --point-color: #ff4d6d; /* 진한 핑크색 포인트 (기존 골드 역할) */
            --text-color: #590d22; /* 핑크 배경에 잘 보이는 어두운 와인/갈색 텍스트 */
            --ball-size: 60px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color); /* 기본 글자색 변경 */
            font-family: 'Do Hyeon', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 헤더 및 푸터 */
        header, footer {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            background: rgba(255, 179, 198, 0.3); /* 연한 핑크 반투명 배경 */
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 10;
        }
        header { color: var(--point-color); font-size: 2.2rem; }
        footer { font-size: 1.3rem; color: #a2556b; margin-top: auto; }

        /* 컨트롤 패널 (입력란) */
        .controls {
            margin: 30px 0;
            padding: 20px;
            background: var(--container-bg);
            border-radius: 15px;
            border: 2px solid rgba(255, 77, 109, 0.3);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(255, 143, 163, 0.3); /* 핑크빛 그림자 */
            z-index: 10;
        }

        .controls input {
            padding: 10px 15px;
            font-size: 1.2rem;
            font-family: 'Do Hyeon', sans-serif;
            border: 2px solid #ffb3c6;
            border-radius: 8px;
            width: 120px;
            text-align: center;
            background: rgba(255,255,255,0.9);
            color: var(--text-color);
            font-weight: bold;
        }
        
        .controls input:focus {
            outline: none;
            border-color: var(--point-color);
        }

        .controls button {
            padding: 10px 25px;
            font-size: 1.3rem;
            font-family: 'Do Hyeon', sans-serif;
            font-weight: bold;
            color: #fff; /* 버튼 글씨는 흰색 */
            background: linear-gradient(135deg, #ff758f, #ff4d6d); /* 핑크 그라데이션 */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .controls button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.5);
        }

        .controls button:disabled {
            background: #ffccd5;
            color: #fff;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 추첨 기계 (중앙) */
        .machine-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px 0;
        }

        #machine {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* 기계 안쪽도 밝은 핑크 톤으로 변경 */
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255, 179, 198, 0.6));
            border: 5px solid var(--point-color);
            box-shadow: inset 0 0 30px rgba(255, 77, 109, 0.3), 0 10px 20px rgba(255, 77, 109, 0.2);
            position: relative;
            overflow: hidden;
        }

        .machine-ball {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s linear;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 결과 표시 영역 */
        #results {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin: 30px 20px;
            min-height: 80px;
            z-index: 10;
        }

        .result-row {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px;
        }

        /* 결과 표시 공 */
        .result-ball {
            width: var(--ball-size);
            height: var(--ball-size);
            border-radius: 50%;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            box-shadow: 0 8px 15px rgba(255, 77, 109, 0.3); /* 공 그림자도 부드럽게 */
            opacity: 0;
            transform: scale(0);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 튀어나오는 애니메이션 */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.1) translateY(50px); }
            50% { opacity: 1; transform: scale(1.2) translateY(-10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 유틸리티 */
        .hidden { display: none !important; }
        .label-text { font-size: 1.2rem; margin-right: 5px; color: var(--text-color); }

        @media (max-width: 600px) {
            header { font-size: 2rem; }
            .controls { flex-direction: column; width: 80%; }
            .controls input { width: 100%; }
        }

/* 떠다니는 벚꽃 스타일 */
        .floating-flower {
            position: fixed; /* 화면 스크롤에 상관없이 전체 화면 기준 */
            bottom: -100px;
            pointer-events: none; /* 마우스 클릭 방해 안 함 */
            z-index: 1; /* 배경 뒤로 보내기 */
            animation: floatUp linear forwards;
            opacity: 0.7;
            user-select: none;
        }

        /* 위로 떠오르며 회전하는 애니메이션 */
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }


    
    </style>
</head>
<body>

    <header> 제21대 경기도보건교사회 2026 정기이사회 </header>

    <div class="controls" id="initControls">
        <div>
            <span class="label-text">총 인원:</span>
            <input type="number" id="totalN" placeholder="예: 100" min="1">
        </div>
        <div>
            <span class="label-text">뽑을 인원:</span>
            <input type="number" id="drawCount" placeholder="예: 3" min="1">
        </div>
        <button id="startBtn" onclick="startDraw()">추첨 시작</button>
    </div>

    <div class="controls hidden" id="moreControls">
        <div>
            <span class="label-text">추가로 뽑을 인원:</span>
            <input type="number" id="extraCount" placeholder="예: 2" min="1">
        </div>
        <button id="moreBtn" onclick="drawMore()">추가 추첨하기</button>
    </div>

    <div class="machine-wrapper">
        <div id="machine"></div>
    </div>

    <div id="results"></div>

    <footer>Made by. 경기도보건교사회 학술이사 수성중학교 최준아</footer>

    <script>

        
        // 0.6초마다 새로운 꽃잎 생성 (숫자를 줄이면 더 많이, 늘리면 더 적게 나옵니다)
        setInterval(createFloatingFlowers, 1000);

        
        // === 2. 작동하는 오디오 설정 (두구두구, 빵빠레) ===
        const mixAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'); 
        const winAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');
        mixAudio.loop = true; 

        // === 전역 변수 ===
        let totalBalls = [];
        let remainingBalls = [];
        let isDrawing = false;
        let mixInterval;
        let currentRowEl = null;

        const machineEl = document.getElementById('machine');
        const resultsEl = document.getElementById('results');
        const initControls = document.getElementById('initControls');
        const moreControls = document.getElementById('moreControls');

// === 색상 배열 (핑크 테마에 맞춰서 화사한 색들로) ===
        const colors = ['#ffb3c6', '#ffc2d1', '#ffe5ec', '#ffc8dd', '#ffafcc', '#bde0fe', '#a2d2ff'];

// === 🌸 벚꽃 생성 자바스크립트 🌸 ===
        function createFloatingFlowers() {
            const flowers = ['🌸', '💮', '🌺', '✨'];
            const flowerEl = document.createElement('div');
            
            flowerEl.innerText = flowers[Math.floor(Math.random() * flowers.length)];
            flowerEl.className = 'floating-flower';
            
            flowerEl.style.left = Math.random() * 100 + 'vw';
            flowerEl.style.fontSize = (Math.random() * 30 + 20) + 'px'; 
            
            const duration = Math.random() * 10 + 7; 
            flowerEl.style.animationDuration = duration + 's';
            
            document.body.appendChild(flowerEl);

            setTimeout(() => {
                flowerEl.remove();
            }, duration * 1000);
        }
        
        // === 1. 초기 추첨 시작 ===
        function startDraw() {
            if (isDrawing) return;

            const n = parseInt(document.getElementById('totalN').value);
            const count = parseInt(document.getElementById('drawCount').value);

            if (isNaN(n) || isNaN(count) || n < 1 || count < 1) {
                alert("올바른 숫자를 입력해주세요.");
                return;
            }
            if (count > n) {
                alert("총 인원보다 많이 뽑을 수 없습니다.");
                return;
            }

            remainingBalls = Array.from({length: n}, (_, i) => i + 1);
            resultsEl.innerHTML = '';
            
            document.getElementById('totalN').disabled = true;
            document.getElementById('drawCount').disabled = true;
            document.getElementById('startBtn').disabled = true;

            executeDrawProcess(count);
        }

        // === 2. 추가 추첨 시작 ===
        function drawMore() {
            if (isDrawing) return;

            const extraCount = parseInt(document.getElementById('extraCount').value);

            if (isNaN(extraCount) || extraCount < 1) {
                alert("올바른 숫자를 입력해주세요.");
                return;
            }
            if (extraCount > remainingBalls.length) {
                alert(`남은 인원(${remainingBalls.length}명)보다 많이 뽑을 수 없습니다.`);
                return;
            }

            moreControls.classList.add('hidden');
            executeDrawProcess(extraCount);
        }

        // === 3. 핵심 추첨 프로세스 ===
        function executeDrawProcess(drawLimit) {
            isDrawing = true;
            createMachineBalls();
            
            // 아래로 쌓이도록 appendChild 유지
            currentRowEl = document.createElement('div');
            currentRowEl.className = 'result-row';
            resultsEl.appendChild(currentRowEl);

            // 두구두구 소리 재생
            mixAudio.play().catch(e => console.log("Audio play blocked by browser"));

            mixInterval = setInterval(() => {
                const balls = document.querySelectorAll('.machine-ball');
                balls.forEach(ball => {
                    const x = (Math.random() - 0.5) * 250; 
                    const y = (Math.random() - 0.5) * 250;
                    ball.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
                });
            }, 100);

            setTimeout(() => {
                let drawnCount = 0;

                const drawInterval = setInterval(() => {
                    if (drawnCount >= drawLimit) {
                        clearInterval(drawInterval);
                        finishDrawProcess();
                        return;
                    }

                    const randomIndex = Math.floor(Math.random() * remainingBalls.length);
                    const winningNumber = remainingBalls.splice(randomIndex, 1)[0];

                    displayWinner(winningNumber);
                    drawnCount++;
                }, 1000);

            }, 2000); 
        }

        // === 4. 당첨 번호 화면에 표시 ===
        function displayWinner(number) {
            const ball = document.createElement('div');
            ball.className = 'result-ball';
            ball.innerText = number;

            const color = colors[Math.floor(Math.random() * colors.length)];
            ball.style.background = `radial-gradient(circle at 30% 30%, #fff, ${color})`;

            currentRowEl.appendChild(ball); 

            const machineBalls = document.querySelectorAll('.machine-ball');
            if (machineBalls.length > 0) {
                machineBalls[0].remove();
            }
        }

        // === 5. 추첨 종료 후 처리 ===
        function finishDrawProcess() {
            clearInterval(mixInterval);
            isDrawing = false;
            machineEl.innerHTML = ''; 
            
            mixAudio.pause();
            mixAudio.currentTime = 0;
            
            // 빵빠레 소리 재생
            winAudio.play().catch(e => console.log("Audio play blocked"));

            // 전문가용 폭죽 실행
            fireConfetti(); 

            initControls.classList.add('hidden');
            moreControls.classList.remove('hidden');
            document.getElementById('extraCount').value = '';
        }

        // === 시각적 보조: 통 안의 공 생성 ===
        function createMachineBalls() {
            machineEl.innerHTML = '';
            const displayCount = Math.min(remainingBalls.length, 50); 
            
            for (let i = 0; i < displayCount; i++) {
                const ball = document.createElement('div');
                ball.className = 'machine-ball';
                const color = colors[Math.floor(Math.random() * colors.length)];
                ball.style.background = `radial-gradient(circle at 30% 30%, #fff, ${color})`;
                machineEl.appendChild(ball);
            }
        }

        // === 3. 전문가용 폭죽(Confetti) 라이브러리 실행 로직 ===
        function fireConfetti() {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 7,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 7,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
